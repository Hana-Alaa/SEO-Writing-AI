<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <meta name="description" content="{{ meta_description }}">
    <style>
        body {
            font-family: "Tahoma", Arial;
            background: #f8f9fa;
            margin: 0;
            padding: 40px;
            line-height: 1.9;
        }

        main {
            max-width: 900px;
            margin: auto;
            background: #fff;
            padding: 40px;
            border-radius: 8px;
        }

        h1,
        h2,
        h3 {
            color: #222;
        }

        img {
            max-width: 100%;
            margin: 20px 0;
        }
    </style>
</head>

<body>

    <main>
        <h1>{{ h1_title }}</h1>        {{ content | safe }}
    </main>

</body>

</html>
